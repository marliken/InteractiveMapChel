<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Карта предприятий и патентов Челябинской области</title>

  <!-- Яндекс.Карты -->
  <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    header {
      padding: 14px 22px;
      background: #1f4e79;
      color: white;
    }

    header h1 {
      margin: 0 0 4px;
      font-size: 21px;
    }

    header p {
      margin: 0;
      font-size: 14px;
      opacity: 0.9;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      height: calc(100vh - 74px);
    }

    .sidebar {
      padding: 14px;
      background: #fff;
      border-right: 1px solid #d9e0e7;
      overflow-y: auto;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .card {
      padding: 13px;
      margin-bottom: 12px;
      border: 1px solid #d9e0e7;
      border-radius: 10px;
      background: white;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
      font-size: 14px;
    }

    input,
    select,
    button {
      width: 100%;
      padding: 9px;
      border: 1px solid #c7d0d9;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      border: 0;
      background: #1f4e79;
      color: white;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover {
      background: #163a5b;
    }

    .status {
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-line;
    }

    .hint {
      font-size: 12px;
      color: #66717c;
      line-height: 1.45;
    }

    .company-item {
      padding: 10px 0;
      border-bottom: 1px solid #e7ecf1;
      font-size: 13px;
      cursor: pointer;
    }

    .company-item:hover {
      background: #f5f8fb;
    }

    .company-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .badge {
      display: inline-block;
      margin-top: 4px;
      padding: 3px 7px;
      border-radius: 999px;
      background: #e8f0f7;
      color: #1f4e79;
      font-size: 12px;
      font-weight: 700;
    }

    .balloon-title {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .balloon-address {
      margin-bottom: 8px;
      color: #555;
      font-size: 13px;
    }

    .patent-list {
      max-height: 260px;
      overflow-y: auto;
      padding-left: 18px;
      margin: 8px 0 0;
    }

    .patent-list li {
      margin-bottom: 5px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .sidebar {
        max-height: 45vh;
        border-right: 0;
        border-bottom: 1px solid #d9e0e7;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Карта предприятий и патентов Челябинской области</h1>
    <p>Одна точка на карте соответствует одному предприятию. В карточке предприятия отображается список патентов.</p>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="card">
        <label for="searchInput">Поиск</label>
        <input id="searchInput" type="text" placeholder="Предприятие, адрес или патент" />
      </div>

      <div class="card">
        <label for="companySelect">Предприятие</label>
        <select id="companySelect">
          <option value="">Все предприятия</option>
        </select>
        <button id="resetButton">Показать все</button>
      </div>

      <div class="card">
        <div id="status" class="status">Загрузка данных...</div>
        <p class="hint">
          Данные берутся из файла <b>patents.json</b>, который должен лежать рядом с <b>index.html</b>.
        </p>
      </div>

      <div class="card">
        <strong>Предприятия</strong>
        <div id="companiesList"></div>
      </div>
    </aside>

    <section>
      <div id="map"></div>
    </section>
  </main>

  <script>
    const DATA_FILE = 'patents.json';
    const REGION_SUFFIX = 'Челябинская область, Россия';

    let map;
    let clusterer;
    let allCompanies = [];
    let shownCompanies = [];
    const placemarksByKey = new Map();

    const searchInput = document.getElementById('searchInput');
    const companySelect = document.getElementById('companySelect');
    const resetButton = document.getElementById('resetButton');
    const statusBlock = document.getElementById('status');
    const companiesList = document.getElementById('companiesList');

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function normalizeText(value) {
      return String(value ?? '')
        .trim()
        .toLowerCase()
        .replaceAll('ё', 'е');
    }

    function getField(row, names) {
      const normalizedRow = {};

      Object.keys(row).forEach(key => {
        normalizedRow[normalizeText(key)] = row[key];
      });

      for (const name of names) {
        const value = normalizedRow[normalizeText(name)];
        if (value !== undefined && value !== null && String(value).trim() !== '') {
          return value;
        }
      }

      return '';
    }

    function parseNumber(value) {
      const number = Number(String(value ?? '').replace(',', '.').trim());
      return Number.isFinite(number) ? number : null;
    }

    function normalizeRawRecords(rows) {
      return rows.map(row => ({
        address: String(getField(row, ['Адрес', 'address']) || '').trim(),
        company: String(getField(row, ['Предприятие', 'Организация', 'Компания', 'Название предприятия', 'company']) || '').trim(),
        patent: String(getField(row, ['Патент', 'Название патента', 'Разработка', 'patent']) || '').trim(),
        lat: parseNumber(getField(row, ['Широта', 'lat', 'latitude'])),
        lon: parseNumber(getField(row, ['Долгота', 'lon', 'lng', 'longitude']))
      })).filter(row => row.company || row.address || row.patent);
    }

    function groupByCompany(records) {
      const grouped = new Map();

      records.forEach(record => {
        const company = record.company || 'Предприятие не указано';
        const address = record.address || 'Адрес не указан';
        const key = `${normalizeText(company)}|${normalizeText(address)}`;

        if (!grouped.has(key)) {
          grouped.set(key, {
            key,
            company,
            address,
            lat: record.lat,
            lon: record.lon,
            patents: []
          });
        }

        const item = grouped.get(key);

        if (!item.lat && record.lat) item.lat = record.lat;
        if (!item.lon && record.lon) item.lon = record.lon;

        if (record.patent && !item.patents.includes(record.patent)) {
          item.patents.push(record.patent);
        }
      });

      return Array.from(grouped.values())
        .sort((a, b) => a.company.localeCompare(b.company, 'ru'));
    }

    async function geocodeCompany(company) {
      if (company.lat && company.lon) return company;
      if (!company.address || company.address === 'Адрес не указан') return company;

      const query = `${company.address}, ${REGION_SUFFIX}`;
      const result = await ymaps.geocode(query, { results: 1 });
      const first = result.geoObjects.get(0);

      if (!first) return company;

      const coords = first.geometry.getCoordinates();
      company.lat = coords[0];
      company.lon = coords[1];
      return company;
    }

    function makeBalloonContent(company) {
      const patents = company.patents.length
        ? company.patents
        : ['Патенты не указаны'];

      const patentItems = patents
        .map(patent => `<li>${escapeHtml(patent)}</li>`)
        .join('');

      return `
        <div class="balloon-title">${escapeHtml(company.company)}</div>
        <div class="balloon-address">${escapeHtml(company.address)}</div>
        <b>Патенты: ${company.patents.length}</b>
        <ol class="patent-list">${patentItems}</ol>
      `;
    }

    function makePlacemark(company) {
      const placemark = new ymaps.Placemark(
        [company.lat, company.lon],
        {
          balloonContent: makeBalloonContent(company),
          hintContent: `${company.company} — ${company.patents.length} пат.`
        },
        {
          preset: 'islands#blueIcon'
        }
      );

      placemark.events.add('click', () => {
        map.setCenter([company.lat, company.lon], Math.max(map.getZoom(), 11), { duration: 300 });
      });

      return placemark;
    }

    function renderMap(companies) {
      clusterer.removeAll();
      placemarksByKey.clear();

      const placemarks = [];
      const bounds = [];

      companies.forEach(company => {
        if (!company.lat || !company.lon) return;

        const placemark = makePlacemark(company);
        placemarks.push(placemark);
        placemarksByKey.set(company.key, placemark);
        bounds.push([company.lat, company.lon]);
      });

      clusterer.add(placemarks);

      if (bounds.length === 1) {
        map.setCenter(bounds[0], 12);
      } else if (bounds.length > 1) {
        map.setBounds(bounds, { checkZoomRange: true, zoomMargin: 40 });
      }
    }

    function renderCompanySelect(companies) {
      companySelect.innerHTML = '<option value="">Все предприятия</option>';

      companies.forEach(company => {
        const option = document.createElement('option');
        option.value = company.key;
        option.textContent = `${company.company} (${company.patents.length})`;
        companySelect.appendChild(option);
      });
    }

    function renderCompaniesList(companies) {
      companiesList.innerHTML = '';

      companies.forEach(company => {
        const div = document.createElement('div');
        div.className = 'company-item';
        div.innerHTML = `
          <strong>${escapeHtml(company.company)}</strong>
          <div class="hint">${escapeHtml(company.address)}</div>
          <span class="badge">${company.patents.length} пат.</span>
        `;

        div.addEventListener('click', () => focusCompany(company.key));
        companiesList.appendChild(div);
      });
    }

    function focusCompany(key) {
      const company = allCompanies.find(item => item.key === key);
      const placemark = placemarksByKey.get(key);

      if (!company || !placemark) return;

      map.setCenter([company.lat, company.lon], 12, { duration: 300 });
      placemark.balloon.open();
    }

    function applyFilters() {
      const query = normalizeText(searchInput.value);
      const selectedKey = companySelect.value;

      shownCompanies = allCompanies.filter(company => {
        const text = normalizeText([
          company.company,
          company.address,
          ...company.patents
        ].join(' '));

        const matchesSearch = !query || text.includes(query);
        const matchesCompany = !selectedKey || company.key === selectedKey;

        return matchesSearch && matchesCompany;
      });

      renderMap(shownCompanies);
      renderCompaniesList(shownCompanies);
      updateStatus();
    }

    function updateStatus(extraText = '') {
      const totalCompanies = allCompanies.length;
      const totalPatents = allCompanies.reduce((sum, company) => sum + company.patents.length, 0);
      const visibleCompanies = shownCompanies.length;
      const visiblePatents = shownCompanies.reduce((sum, company) => sum + company.patents.length, 0);
      const withoutCoords = allCompanies.filter(company => !company.lat || !company.lon).length;

      statusBlock.textContent = [
        extraText,
        `Всего предприятий: ${totalCompanies}`,
        `Всего патентов: ${totalPatents}`,
        `Показано предприятий: ${visibleCompanies}`,
        `Показано патентов: ${visiblePatents}`,
        withoutCoords ? `Без координат: ${withoutCoords}` : ''
      ].filter(Boolean).join('\n');
    }

    async function loadData() {
      const response = await fetch(DATA_FILE);

      if (!response.ok) {
        throw new Error(`Не удалось загрузить ${DATA_FILE}`);
      }

      const rows = await response.json();
      const records = normalizeRawRecords(rows);
      const grouped = groupByCompany(records);

      let foundCoords = 0;
      let failedCoords = 0;

      for (let i = 0; i < grouped.length; i++) {
        const company = grouped[i];
        statusBlock.textContent = `Геокодирование адресов: ${i + 1} из ${grouped.length}`;

        try {
          await geocodeCompany(company);
          if (company.lat && company.lon) foundCoords++;
          else failedCoords++;
        } catch (error) {
          console.warn('Ошибка геокодирования:', company, error);
          failedCoords++;
        }
      }

      allCompanies = grouped;
      shownCompanies = grouped;

      renderCompanySelect(allCompanies);
      renderMap(shownCompanies);
      renderCompaniesList(shownCompanies);
      updateStatus(`Данные загружены. Координаты найдены: ${foundCoords}. Не найдены: ${failedCoords}.`);
    }

    searchInput.addEventListener('input', applyFilters);
    companySelect.addEventListener('change', applyFilters);

    resetButton.addEventListener('click', () => {
      searchInput.value = '';
      companySelect.value = '';
      applyFilters();
    });

    ymaps.ready(async () => {
      map = new ymaps.Map('map', {
        center: [54.4, 60.9],
        zoom: 7,
        controls: ['zoomControl', 'fullscreenControl', 'typeSelector']
      });

      clusterer = new ymaps.Clusterer({
        preset: 'islands#blueClusterIcons',
        groupByCoordinates: false,
        clusterDisableClickZoom: false,
        clusterOpenBalloonOnClick: true
      });

      map.geoObjects.add(clusterer);

      try {
        await loadData();
      } catch (error) {
        console.error(error);
        statusBlock.textContent = 'Ошибка загрузки данных. Проверьте, что рядом с index.html есть файл patents.json.';
      }
    });
  </script>
</body>
</html>
